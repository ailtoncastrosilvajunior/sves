# só o app Rails; Postgres é sempre remoto (ex.: droplet DigitalOcean).
# Credenciais em `.env` na raiz — carregadas pelo `dotenv-rails` ao arrancar (`DATABASE_*` ou `DATABASE_URL`).

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash -lc "bundle check || bundle install; bin/rails db:prepare && rm -f tmp/pids/server.pid && exec ./bin/dev"
    volumes:
      - .:/rails
      - bundle:/usr/local/bundle
      - rails_tmp:/rails/tmp
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      RAILS_ENV: development
      TZ: America/Sao_Paulo
    stdin_open: true
    tty: true

volumes:
  bundle:
  rails_tmp:
