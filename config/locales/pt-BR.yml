      generico: "Não foi possível aceitar esta imagem. Prefira JPG, PNG ou WebP (tamanho moderado)."
      formato_ou_pixels: "Não conseguimos ler este ficheiro como imagem. Se tirou foto com iPhone (HEIC), use «Copiar foto» ou regule a câmar para «Mais compatível» antes de tirar — ou exporte JPEG no Fotografias e envie esse ficheiro."
      bucket_inexistente: >-
        O Spaces devolveu NoSuchBucket: o cliente S3 falhou mesmo com nome de bucket «correcto». O mais habitual é DO_SPACES_REGION
        diferente do datacenter real do Space (no painel deve coincidir: ex.: sfo3 ↔ https://sfo3.digitaloceanspaces.com).
        Se omitir DO_SPACES_REGION, este projeto assume nyc3 no storage.yml — noutro datacenter causa exactamente este erro.
        Confirme DO_SPACES_BUCKET com o nome exacto do Space (sem espaços) e copie para DO_SPACES_REGION o datacenter indicado ao lado do mesmo Space no painel.
        Verifique também se o Space não está marcado como agendado para eliminação; cancele o agendamento se aparecer esse aviso — nesse estado os uploads falham mesmo com nome e região correctos.
        Opcionalmente defina DO_SPACES_ENDPOINT regional completo ou tente DO_SPACES_FORCE_PATH_STYLE=true. Reinicie a app (.env só
        aplica ao arranque).
      armazem_remoto: >-
        Houve falha ao usar o armazém DigitalOcean Spaces (rede ou configuração).
        No App Platform verifique ACTIVE_STORAGE_SERVICE=digitalocean_spaces;
        DO_SPACES_ACCESS_KEY_ID e DO_SPACES_SECRET_ACCESS_KEY; DO_SPACES_BUCKET;
        DO_SPACES_REGION e, se for o caso, DO_SPACES_ENDPOINT (ex.: https://sfo3.digitaloceanspaces.com).
        O arquivo config/storage.yml neste projeto define assinatura na região us-east-1 e checksum when_required,
        compatíveis com o Spaces; altere as variáveis e faça um novo deploy da aplicação.
        Se o cadastro está ok mas só a foto some ao ver ou editar o cenáculo, pode ser registro órfão
        (banco migrado sem o arquivo no bucket): marque Remover imagem atual, salve e envie a imagem de novo.
