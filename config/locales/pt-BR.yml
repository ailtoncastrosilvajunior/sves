      doc_nota_paridade_pastoral: >-
        O mesmo casal servidor continua sendo o referencial pastoral deste cenáculo inteiro mesmo quando há encontros separados por sexo; esta folha apenas reproduz os nomes vindos das fichas.
      doc_grupo_heading: "Cenáculo sugerido %{numero}"
      doc_motivo_por_casal_heading: "Notas por casal geradas apenas a partir dos dados tratados pela heurística (revisável)"
      texto_regra_padrao_html:
        |-
          <p><strong>Unidade</strong>: o agrupamento respeita casais ínteiros («uma só carne» pastoralmente dentro deste exercício apenas documental).</p>
          <p><strong>Heterogeneidade</strong>: marcações vindas apenas dos campos já existentes nos registos dos casais; nada novo é criado pela ferramenta além das combinações propostas em memória.</p>
          <p><strong>Encontros por género possíveis</strong>: continuam sendo os mesmos casais inteiriços já listados antes; apenas se explicitam listas paralelas caso isso sirva aos encontros por sexos já referidos institucionalmente.</p>
