        one: "<strong>1 casal</strong> considerado pela sugestão."
        other: "<strong>%{count} casais</strong> considerados pela sugestão."
      apenas_livres_label: "Apenas casais sem cenáculo atribuído nesta edição"
      apenas_livres_ajuda: >-
        Se estiver marcado, ignoramos quem já figura oficialmente algum cenáculo registado nos dados do painel.
        Desmarque se quiser reequilibrar cenários usando toda a listagem atual de casais registados antes de mover alguém de grupo oficial.
      casais_por_grupo_label: "Quantidade pretendida por cenáculo"
      casais_por_grupo_dica: "O algoritmo evita cenários apenas homogêneos; o último grupamento pode ficar menor se o número de casais não for múltiplo da meta."
      semilla_label: "Semente (opcional) — mesma entrada gera sempre a mesma mistura inicial"
      semilla_placeholder: "Deixe em branco ou use um número (ex.: 8742) ou uma frase curta"
      semilla_dica: >-
        O programa primeiro baralha a lista de casais; só depois monta os grupos. Se o campo ficar vazio,
        o baralhamento muda a cada geração; o relatório indica na mesma qual número foi usado, para poder repetir se quiser.
        Se preencher sempre com o mesmo número (ou a mesma frase), a ordem inicial fica estável — útil para comparar tentativas ou mostrar o mesmo resultado a outra pessoa.
      prompt_label: "Texto público sobre a regra (pode rever antes do processamento)"
      prompt_ajuda: >-
        Descreva o sentido pastoral e operacional esperado antes de exportar —
        será embutido no documento e ajuda outros leitores a compreender porque certas marcações foram usadas apenas como entrada técnica.
